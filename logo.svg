<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E7D7C1"/>
      <stop offset="40%" style="stop-color:#C8A97E"/>
      <stop offset="100%" style="stop-color:#9A7A52"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DFC28E"/>
      <stop offset="100%" style="stop-color:#B8905C"/>
    </linearGradient>
  </defs>
  
  <!-- Ring 1 -->
  <circle cx="44" cy="60" r="22" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <!-- Ring 2 overlapping -->
  <circle cx="64" cy="60" r="22" fill="none" stroke="url(#gold2)" stroke-width="5"/>
  
  <!-- Diamond on top -->
  <polygon points="54,22 60,30 54,38 48,30" fill="url(#gold)" opacity="0.9"/>
  
  <!-- Loviva text -->
  <text x="100" y="75" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="52" 
    font-weight="400"
    font-style="italic"
    fill="url(#gold)"
    letter-spacing="-1">Loviva</text>
    
  <!-- Tagline -->
  <text x="101" y="95"
    font-family="Arial, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#C8A97E"
    letter-spacing="3"
    opacity="0.8">LESS STRESS. MORE LOVE.</text>
</svg>