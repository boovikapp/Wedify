<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WedJoy Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{direction:rtl;}
body{font-family:'Heebo',sans-serif;background:#F0EBE3;min-height:100vh;}
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1F1F1F,#2E2924);padding:20px;}
.login-card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:360px;
  box-shadow:0 24px 60px rgba(0,0,0,0.4);text-align:center;}
.login-card img{height:52px;object-fit:contain;margin-bottom:20px;}
.login-card h1{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:4px;}
.login-card p{font-size:13px;color:#7A746E;margin-bottom:24px;}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid #E7D7C1;border-radius:10px;
  font-size:14px;font-family:'Heebo',sans-serif;outline:none;margin-bottom:8px;direction:ltr;}
.login-card input:focus{border-color:#C8A97E;}
#loginErr{color:#B23A48;font-size:13px;margin-bottom:10px;display:none;
  background:#FBEAEC;padding:8px 12px;border-radius:8px;}
.login-card button{width:100%;padding:13px;background:#1F1F1F;color:#fff;border:none;
  border-radius:12px;font-size:15px;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;}
.login-card button:hover{background:#2E2924;}
#appWrap{display:none;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:220px;min-height:100vh;background:#1F1F1F;position:fixed;top:0;right:0;
  display:flex;flex-direction:column;z-index:50;}
.sb-head{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-between;}
.sb-head img{height:34px;object-fit:contain;filter:brightness(0) invert(1);}
.sb-badge{background:#6D1F2F;color:#fff;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:100px;}
.sb-nav{flex:1;padding:8px 0;}
.nav-s{padding:14px 16px 4px;font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);}
.nav-i{display:flex;align-items:center;gap:10px;padding:10px 16px;color:rgba(255,255,255,0.55);
  font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:right;
  font-family:'Heebo',sans-serif;transition:all 0.15s;position:relative;}
.nav-i:hover{color:#fff;background:rgba(255,255,255,0.05);}
.nav-i.on{color:#C8A97E;background:rgba(200,169,126,0.12);}
.nav-i.on::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:#C8A97E;border-radius:0 2px 2px 0;}
.sb-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.08);}
.btn-out{width:100%;padding:8px;background:transparent;color:#B23A48;
  border:1.5px solid #F5C2C8;border-radius:10px;font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;}

/* MAIN */
.main{margin-right:220px;min-height:100vh;}
.mob-top{display:none;background:#1F1F1F;height:52px;padding:0 16px;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.mob-top img{height:32px;filter:brightness(0) invert(1);}
.hbg{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;}
.hbg span{width:22px;height:2px;background:#fff;border-radius:2px;display:block;}
.sob{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:49;}

/* CONTENT */
.ph{padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.pt{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;}
.ps{font-size:13px;color:#7A746E;margin-top:2px;}
.pb{padding:18px 24px 60px;}

.card{background:#fff;border-radius:18px;border:1px solid #E7D7C1;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:20px;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.sc{background:#fff;border-radius:14px;padding:16px;border:1px solid #E7D7C1;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.sc.dk{background:#1F1F1F;border:none;}
.si{margin-bottom:8px;color:#C8A97E;}
.sv{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;line-height:1;color:#1F1F1F;}
.sv.w{color:#fff;}
.sv.g{color:#C8A97E;}
.sl{font-size:12px;color:#7A746E;margin-top:3px;}
.sl.w{color:rgba(255,255,255,0.6);}

.tw{background:#fff;border-radius:16px;border:1px solid #E7D7C1;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);}
table{width:100%;border-collapse:collapse;}
thead{background:#F3EDE4;}
th{padding:10px 14px;text-align:right;font-size:11px;font-weight:700;color:#7A746E;
  text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #E7D7C1;}
tbody tr{border-bottom:1px solid #F5EDE8;cursor:pointer;}
tbody tr:hover{background:#FAF7F2;}
td{padding:12px 14px;font-size:13px;vertical-align:middle;}

.badge{display:inline-flex;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.bg{background:#F3EDE4;color:#7A746E;}
.bgr{background:#E8F4EF;color:#1F7A5A;}
.bga{background:#FDF6E3;color:#D4A017;}
.bgd{background:rgba(200,169,126,0.2);color:#8B6530;}

.mc{display:flex;align-items:flex-end;gap:5px;height:60px;}
.mb{flex:1;border-radius:2px 2px 0 0;background:#C8A97E;}
.ml{font-size:9px;color:#B8B2AC;text-align:center;margin-top:3px;}

.sec{font-size:11px;font-weight:700;color:#7A746E;text-transform:uppercase;
  letter-spacing:0.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:#E7D7C1;}

/* modal */
.moverlay{position:fixed;inset:0;background:rgba(31,31,31,0.6);backdrop-filter:blur(6px);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity 0.2s;}
.moverlay.open{opacity:1;pointer-events:all;}
.mbox{background:#fff;border-radius:22px;padding:26px;width:100%;max-width:460px;
  max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mt{font-size:15px;font-weight:700;}
.mc2{width:28px;height:28px;border-radius:50%;border:none;background:#F3EDE4;cursor:pointer;font-size:14px;}

/* toast */
.tw2{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.t{background:#1F1F1F;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;
  animation:ti 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
@keyframes ti{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:768px){
  .sidebar{transform:translateX(100%);transition:transform 0.28s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-right:0;}
  .mob-top{display:flex;}
  .sg{grid-template-columns:repeat(2,1fr);}
  .ph{padding:14px 14px 0;}
  .pb{padding:14px 14px 60px;}
}
</style>
</head>
<body>

<div class="tw2" id="tw"></div>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <img id="loginLogo" src="" alt="WedJoy">
    <h1>ניהול מערכת</h1>
    <p>כניסה לבעלי המערכת בלבד</p>
    <div id="loginErr"></div>
    <input type="password" id="ownerPass" placeholder="סיסמת מנהל" autocomplete="current-password">
    <div style="height:10px;"></div>
    <button id="loginBtn">כניסה ←</button>
  </div>
</div>

<!-- APP -->
<div id="appWrap">
  <div class="sob" id="sob" onclick="closeSB()"></div>
  <aside class="sidebar" id="sb">
    <div class="sb-head">
      <img id="sbLogo" src="" alt="WedJoy">
      <span class="sb-badge">ADMIN</span>
    </div>
    <nav class="sb-nav">
      <div class="nav-s">סקירה</div>
      <button class="nav-i on" id="n-ov" onclick="goPage('overview',this)">📊 דשבורד ראשי</button>
      <div class="nav-s">לקוחות</div>
      <button class="nav-i" id="n-us" onclick="goPage('users',this)">👥 כל הזוגות</button>
      <button class="nav-i" id="n-ev" onclick="goPage('events',this)">📅 אירועים</button>
      <div class="nav-s">נתונים</div>
      <button class="nav-i" id="n-st" onclick="goPage('stats',this)">📈 סטטיסטיקות</button>
    </nav>
    <div class="sb-foot">
      <button class="btn-out" onclick="doLogout()">יציאה</button>
    </div>
  </aside>
  <main class="main">
    <div class="mob-top">
      <img id="mobLogo" src="" alt="WedJoy">
      <button class="hbg" onclick="openSB()"><span></span><span></span><span></span></button>
    </div>
    <div id="pc"></div>
  </main>
</div>

<!-- MODAL -->
<div class="moverlay" id="mUser" onclick="if(event.target===this)closeMod()">
  <div class="mbox">
    <div class="mh">
      <div class="mt" id="mTitle">פרטי זוג</div>
      <button class="mc2" onclick="closeMod()">✕</button>
    </div>
    <div id="mContent"></div>
  </div>
</div>

let sb, users=[], events=[], contacts=[], guests=[];

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  // Set logos
  ['loginLogo','sbLogo','mobLogo'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.src = 'data:image/png;base64,' + LOGO;
  });

  // Login button
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('ownerPass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
  });

  // Auto-login if saved
  if (localStorage.getItem('wj_owner') === '1') {
    showApp();
  }
});

function tryLogin() {
  var pass = document.getElementById('ownerPass').value.trim();
  var err  = document.getElementById('loginErr');
  err.style.display = 'none';
  if (!pass) { err.textContent = 'נא להכניס סיסמה'; err.style.display = 'block'; return; }
  if (pass !== PASS) { err.textContent = 'סיסמה שגויה'; err.style.display = 'block'; return; }
  localStorage.setItem('wj_owner', '1');
  showApp();
}

function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display   = 'block';
  sb = supabase.createClient(SURL, SKEY);
  loadAll();
}

function doLogout() {
  localStorage.removeItem('wj_owner');
  document.getElementById('appWrap').style.display   = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
}

// ── DATA ─────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('pc').innerHTML =
    '<div style="text-align:center;padding:60px;color:#7A746E;">טוען...</div>';
  const [u,ev,ct,gs] = await Promise.all([
    sb.from('users').select('*').order('created_at',{ascending:false}),
    sb.from('events').select('*'),
    sb.from('contacts').select('*'),
    sb.from('guests').select('*'),
  ]);
  users=u.data||[]; events=ev.data||[]; contacts=ct.data||[]; guests=gs.data||[];
  goPage('overview', document.getElementById('n-ov'));
}

// ── ROUTING ───────────────────────────────────────────────
function goPage(name, btn) {
  document.querySelectorAll('.nav-i').forEach(function(e){e.classList.remove('on');});
  if (btn) btn.classList.add('on');
  closeSB();
  var fns = {overview:pgOverview, users:pgUsers, events:pgEvents, stats:pgStats};
  (fns[name]||pgOverview)();
}

// ── OVERVIEW ─────────────────────────────────────────────
function pgOverview() {
  var total = users.length;
  var now   = new Date();
  var confirmed = guests.filter(function(g){return g.status==='confirmed';}).length;
  var revenue = events.reduce(function(s,ev){
    var n = contacts.filter(function(c){return c.event_id===ev.id;}).length;
    return s+(n>250?300:n>100?200:0);
  },0);
  var newThisWeek = users.filter(function(u){
    return (now-new Date(u.created_at))/(1000*60*60*24)<=7;
  }).length;

  // 8-week chart
  var weeks = [];
  for (var i=7;i>=0;i--) {
    var ws=new Date(now); ws.setDate(now.getDate()-i*7);
    var we=new Date(now); we.setDate(now.getDate()-(i-1)*7);
    weeks.push(users.filter(function(u){var d=new Date(u.created_at);return d>=ws&&d<we;}).length);
  }
  var maxW = Math.max.apply(null,weeks)||1;

  document.getElementById('pc').innerHTML =
    '<div class="ph"><div><div class="pt">דשבורד ראשי</div><div class="ps">סקירה כללית</div></div>' +
    '<button onclick="loadAll()" style="padding:8px 16px;border-radius:10px;border:1.5px solid #E7D7C1;background:transparent;font-family:Heebo,sans-serif;font-size:13px;cursor:pointer;">רענן</button></div>' +
    '<div class="pb">' +
    '<div class="sg">' +
    '<div class="sc"><div class="si">👥</div><div class="sv">'+total+'</div><div class="sl">זוגות רשומים</div>'+(newThisWeek?'<div style="font-size:11px;color:#1F7A5A;margin-top:3px;">+'+newThisWeek+' השבוע</div>':'')+'</div>' +
    '<div class="sc dk"><div class="si">📅</div><div class="sv g">'+events.filter(function(e){return e.event_date;}).length+'</div><div class="sl w">אירועים</div></div>' +
    '<div class="sc"><div class="si">✅</div><div class="sv" style="color:#1F7A5A;">'+confirmed+'</div><div class="sl">אישורי הגעה</div></div>' +
    '<div class="sc"><div class="si">💰</div><div class="sv">'+revenue.toLocaleString()+'</div><div class="sl">הכנסות ₪</div></div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">' +
    '<div class="card"><div class="sec">הצטרפויות 8 שבועות</div>' +
    '<div class="mc">'+weeks.map(function(w,i){return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:3px;"><div class="mb" style="height:'+Math.max(4,Math.round(w/maxW*100))+'%;opacity:'+(0.4+i*0.07)+';"></div><div class="ml">ש'+(i+1)+'</div></div>';}).join('')+'</div>' +
    '</div>' +
    '<div class="card"><div class="sec">פילוח תוכניות</div>' +
    ['FREE','PREMIUM','LUXURY'].map(function(plan,i){
      var n = users.filter(function(u){
        var ev=events.find(function(e){return e.user_id===u.id;});
        var ct=contacts.filter(function(c){return c.event_id===ev?.id;}).length;
        return i===0?ct<=100:i===1?ct>100&&ct<=250:ct>250;
      }).length;
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F5EDE8;">'+
        '<span style="font-size:13px;">'+plan+'</span>'+
        '<span class="badge '+(i===0?'bg':i===1?'bgd':'bgr')+'">'+n+'</span></div>';
    }).join('') +
    '</div></div>' +
    '<div class="sec">הצטרפויות אחרונות</div>' +
    '<div class="tw"><table><thead><tr><th>זוג</th><th>אימייל</th><th>מוזמנים</th><th>תוכנית</th><th>נרשמו</th></tr></thead><tbody>' +
    users.slice(0,8).map(function(u){
      var ev=events.find(function(e){return e.user_id===u.id;});
      var ct=contacts.filter(function(c){return c.event_id===ev?.id;}).length;
      var plan=ct>250?'LUXURY':ct>100?'PREMIUM':'FREE';
      var pc=ct>250?'bgr':ct>100?'bgd':'bg';
      return '<tr onclick="showUser(''+u.id+'')"><td><strong>'+u.bride_name+' ו'+u.groom_name+'</strong></td>'+
        '<td style="color:#7A746E;font-size:12px;">'+u.email+'</td>'+
        '<td><span class="badge bg">'+ct+'</span></td>'+
        '<td><span class="badge '+pc+'">'+plan+'</span></td>'+
        '<td style="font-size:12px;color:#7A746E;">'+new Date(u.created_at).toLocaleDateString('he-IL')+'</td></tr>';
    }).join('') +
    '</tbody></table></div></div>';
}

// ── USERS ─────────────────────────────────────────────────
function pgUsers() {
  document.getElementById('pc').innerHTML =
    '<div class="ph"><div><div class="pt">כל הזוגות</div><div class="ps">'+users.length+' רשומים</div></div>' +
    '<button onclick="exportCSV()" style="padding:8px 16px;border-radius:10px;border:1.5px solid #E7D7C1;background:transparent;font-family:Heebo,sans-serif;font-size:13px;cursor:pointer;">📥 ייצוא CSV</button></div>' +
    '<div class="pb"><div class="tw"><table><thead><tr><th>זוג</th><th>אימייל</th><th>תאריך אירוע</th><th>מוזמנים</th><th>אישרו</th><th>תוכנית</th><th>נרשמו</th></tr></thead><tbody>' +
    users.map(function(u){
      var ev=events.find(function(e){return e.user_id===u.id;});
      var ct=contacts.filter(function(c){return c.event_id===ev?.id;}).length;
      var cf=guests.filter(function(g){return g.event_id===ev?.id&&g.status==='confirmed';}).length;
      var plan=ct>250?'LUXURY':ct>100?'PREMIUM':'FREE';
      var pc=ct>250?'bgr':ct>100?'bgd':'bg';
      return '<tr onclick="showUser(''+u.id+'')"><td><strong>'+u.bride_name+' ו'+u.groom_name+'</strong></td>'+
        '<td style="font-size:12px;color:#7A746E;">'+u.email+'</td>'+
        '<td style="font-size:12px;">'+(ev?.event_date?new Date(ev.event_date).toLocaleDateString('he-IL'):'—')+'</td>'+
        '<td><span class="badge bg">'+ct+'</span></td>'+
        '<td><span class="badge bgr">'+cf+'</span></td>'+
        '<td><span class="badge '+pc+'">'+plan+'</span></td>'+
        '<td style="font-size:12px;color:#7A746E;">'+new Date(u.created_at).toLocaleDateString('he-IL')+'</td></tr>';
    }).join('') +
    '</tbody></table></div></div>';
}

// ── EVENTS ────────────────────────────────────────────────
function pgEvents() {
  var now = new Date();
  var withDate = events.filter(function(e){return e.event_date;}).sort(function(a,b){return new Date(a.event_date)-new Date(b.event_date);});
  var future = withDate.filter(function(e){return new Date(e.event_date)>=now;});
  var past   = withDate.filter(function(e){return new Date(e.event_date)<now;});

  document.getElementById('pc').innerHTML =
    '<div class="ph"><div class="pt">אירועים</div><div class="ps">'+future.length+' קרובים · '+past.length+' עברו</div></div>' +
    '<div class="pb">' +
    (future.length?'<div class="sec">אירועים קרובים</div><div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">' +
    future.map(function(ev){
      var u=users.find(function(x){return x.id===ev.user_id;});
      var ct=contacts.filter(function(c){return c.event_id===ev.id;}).length;
      var cf=guests.filter(function(g){return g.event_id===ev.id&&g.status==='confirmed';}).length;
      var d=new Date(ev.event_date);
      var diff=Math.ceil((d-now)/(1000*60*60*24));
      return '<div class="card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:16px 18px;">' +
        '<div style="width:48px;height:48px;border-radius:12px;background:'+(diff<=7?'#6D1F2F':'#1F1F1F')+';display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">' +
        '<div style="font-size:18px;font-weight:700;color:#C8A97E;line-height:1;">'+d.getDate()+'</div>' +
        '<div style="font-size:9px;color:rgba(255,255,255,0.6);">'+d.toLocaleDateString('he-IL',{month:'short'})+'</div></div>' +
        '<div style="flex:1;"><div style="font-weight:700;font-size:14px;">'+(u?.bride_name||'?')+' ו'+(u?.groom_name||'?')+'</div>' +
        '<div style="font-size:12px;color:#7A746E;">'+(ev.venue||'אולם לא הוגדר')+'</div></div>' +
        '<span class="badge '+(diff<=7?'':'bg')+'" style="'+(diff<=7?'background:#FBEAEC;color:#B23A48;':'')+'">'+diff+' ימים</span>' +
        '<span class="badge bg">'+ct+' מוזמנים</span><span class="badge bgr">'+cf+' אישרו</span></div>';
    }).join('')+'</div>':'') +
    (past.length?'<div class="sec">עברו</div><div class="tw"><table><thead><tr><th>זוג</th><th>תאריך</th><th>אולם</th><th>מוזמנים</th><th>הגיעו</th></tr></thead><tbody>'+
    past.reverse().slice(0,10).map(function(ev){
      var u=users.find(function(x){return x.id===ev.user_id;});
      var ct=contacts.filter(function(c){return c.event_id===ev.id;}).length;
      var cf=guests.filter(function(g){return g.event_id===ev.id&&g.status==='confirmed';}).length;
      return '<tr><td><strong>'+(u?.bride_name||'?')+' ו'+(u?.groom_name||'?')+'</strong></td>'+
        '<td style="font-size:12px;">'+new Date(ev.event_date).toLocaleDateString('he-IL')+'</td>'+
        '<td style="font-size:12px;color:#7A746E;">'+(ev.venue||'—')+'</td>'+
        '<td><span class="badge bg">'+ct+'</span></td><td><span class="badge bgr">'+cf+'</span></td></tr>';
    }).join('')+'</tbody></table></div>':'') +
    '</div>';
}

// ── STATS ─────────────────────────────────────────────────
function pgStats() {
  var tc=contacts.length, tg=guests.length;
  var cf=guests.filter(function(g){return g.status==='confirmed';}).length;
  var dc=guests.filter(function(g){return g.status==='declined';}).length;
  var rate=tc>0?Math.round(cf/tc*100):0;
  var avg=users.length>0?Math.round(tc/users.length):0;

  document.getElementById('pc').innerHTML =
    '<div class="ph"><div class="pt">סטטיסטיקות</div></div>' +
    '<div class="pb"><div class="sg">' +
    ['📨|'+tc+'|הזמנות נשלחו','✅|'+cf+'|אישרו הגעה','📊|'+rate+'%|שיעור אישורים','👥|'+avg+'|ממוצע לאירוע'].map(function(s){
      var p=s.split('|');
      return '<div class="sc"><div class="si">'+p[0]+'</div><div class="sv">'+p[1]+'</div><div class="sl">'+p[2]+'</div></div>';
    }).join('') +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">' +
    '<div class="card"><div class="sec">פילוח תוכניות</div>' +
    [['FREE',0,100,'bg'],['PREMIUM',100,250,'bgd'],['LUXURY',250,99999,'bgr']].map(function(p){
      var n=users.filter(function(u){var ev=events.find(function(e){return e.user_id===u.id;});var ct=contacts.filter(function(c){return c.event_id===ev?.id;}).length;return ct>p[1]&&ct<=p[2];}).length;
      return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F5EDE8;"><span>'+p[0]+'</span><span class="badge '+p[3]+'">'+n+'</span></div>';
    }).join('')+'</div>' +
    '<div class="card"><div class="sec">סטטוס אישורים</div>' +
    [['אישרו',cf,'#1F7A5A'],['לא מגיעים',dc,'#B23A48'],['ממתינים',tc-cf-dc,'#D4A017']].map(function(p){
      var pct=tc>0?Math.round(p[1]/tc*100):0;
      return '<div style="padding:8px 0;border-bottom:1px solid #F5EDE8;">' +
        '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span>'+p[0]+'</span><span>'+p[1]+'</span></div>' +
        '<div style="background:#E7D7C1;border-radius:100px;height:5px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:'+p[2]+';border-radius:100px;"></div></div>' +
        '</div>';
    }).join('')+'</div>' +
    '</div></div>';
}

// ── USER DETAIL ───────────────────────────────────────────
function showUser(uid) {
  var u=users.find(function(x){return x.id===uid;});
  if(!u) return;
  var ev=events.find(function(e){return e.user_id===u.id;});
  var ct=contacts.filter(function(c){return c.event_id===ev?.id;});
  var gs2=guests.filter(function(g){return g.event_id===ev?.id;});
  var cf=gs2.filter(function(g){return g.status==='confirmed';});
  var plan=ct.length>250?'LUXURY':ct.length>100?'PREMIUM':'FREE';

  document.getElementById('mTitle').textContent = u.bride_name+' ו'+u.groom_name;
  document.getElementById('mContent').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">' +
    [['אימייל',u.email],['טלפון',u.phone||'—'],['תאריך',ev?.event_date?new Date(ev.event_date).toLocaleDateString('he-IL'):'—'],['אולם',ev?.venue||'—'],['תוכנית',plan],['נרשמו',new Date(u.created_at).toLocaleDateString('he-IL')]].map(function(p){
      return '<div style="background:#FAF7F2;border-radius:10px;padding:10px;"><div style="font-size:11px;color:#7A746E;margin-bottom:2px;">'+p[0]+'</div><div style="font-size:13px;font-weight:600;">'+p[1]+'</div></div>';
    }).join('')+'</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">' +
    [['ברשימה',ct.length,'#1F1F1F'],['אישרו',cf.length,'#1F7A5A'],['לא מגיעים',gs2.filter(function(g){return g.status==='declined';}).length,'#B23A48']].map(function(p){
      return '<div style="background:#FAF7F2;border-radius:10px;padding:12px;text-align:center;">' +
        '<div style="font-family:'Cormorant Garamond',serif;font-size:26px;color:'+p[2]+';">'+p[1]+'</div>' +
        '<div style="font-size:11px;color:#7A746E;">'+p[0]+'</div></div>';
    }).join('')+'</div>' +
    (ct.length?'<div style="font-size:11px;font-weight:700;color:#7A746E;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">אנשי קשר ('+ct.length+')</div>' +
    '<div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;">' +
    ct.slice(0,15).map(function(c){
      var g=gs2.find(function(x){return x.contact_id===c.id;});
      var s=g?.status==='confirmed'?'✓ מגיע':g?.status==='declined'?'✗ לא מגיע':'ממתין';
      var sc=g?.status==='confirmed'?'bgr':g?.status==='declined'?'':'bg';
      return '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FAF7F2;border-radius:8px;">' +
        '<div style="flex:1;font-size:13px;">'+c.first_name+' '+c.last_name+'</div>' +
        '<span class="badge '+sc+'">'+s+'</span></div>';
    }).join('')+'</div>':'');

  document.getElementById('mUser').classList.add('open');
}

function closeMod() { document.getElementById('mUser').classList.remove('open'); }

// ── EXPORT ────────────────────────────────────────────────
function exportCSV() {
  var rows = users.map(function(u){
    var ev=events.find(function(e){return e.user_id===u.id;});
    var ct=contacts.filter(function(c){return c.event_id===ev?.id;}).length;
    var cf=guests.filter(function(g){return g.event_id===ev?.id&&g.status==='confirmed';}).length;
    return [u.bride_name,u.groom_name,u.email,u.phone||'',ev?.event_date||'',ev?.venue||'',ct,cf].join(',');
  });
  var csv = ['כלה,חתן,אימייל,טלפון,תאריך,אולם,מוזמנים,אישרו'].concat(rows).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='wedjoy_'+new Date().toLocaleDateString('he-IL')+'.csv';
  a.click();
}

// ── SIDEBAR ───────────────────────────────────────────────
function openSB()  { document.getElementById('sb').classList.add('open'); document.getElementById('sob').style.display='block'; }
function closeSB() { document.getElementById('sb').classList.remove('open'); document.getElementById('sob').style.display='none'; }

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  var c=document.getElementById('tw');
  var t=document.createElement('div');
  t.className='t'; t.textContent=msg; c.appendChild(t);
  setTimeout(function(){t.remove();},3000);
}
</script>
