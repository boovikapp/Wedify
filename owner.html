#app{display:none;}

  <h1>ניהול מערכת</h1>
  <p>כניסה לבעלי המערכת בלבד</p>
  <div id="err">סיסמה שגויה</div>
  <input type="password" id="p" placeholder="סיסמה">
  <button id="btn">כניסה</button>
</div>

<script>
(function() {
  var btn = document.getElementById('btn');
  var inp = document.getElementById('p');
  var err = document.getElementById('err');
  
  function login() {
    var val = inp.value;
    alert('הזנת: ' + val);
    if (val === 'wedjoy2025') {
      alert('סיסמה נכונה!');
    } else {
      err.style.display = 'block';
    }
  }
  
  btn.onclick = login;
  inp.onkeydown = function(e) {
    if (e.keyCode === 13) login();
  };
})();
</script>
