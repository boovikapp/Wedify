<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WedJoy — ניהול מערכת</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
:root {
  --gold:#C8A97E; --gold-pale:#F5EDE0; --border:#E7D7C1;
  --burgundy:#6D1F2F; --ivory:#FAF7F2; --white:#FFFFFF;
  --black:#1F1F1F; --gray:#7A746E; --gray-light:#B8B2AC;
  --green:#1F7A5A; --red:#B23A48; --amber:#D4A017;
  --sidebar-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{direction:rtl;}
body{font-family:'Heebo',sans-serif;background:#F0EBE3;color:var(--black);-webkit-font-smoothing:antialiased;}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1F1F1F 0%,#2E2924 100%);padding:20px;}
.login-box{background:var(--white);border-radius:24px;padding:40px;width:100%;max-width:380px;
  box-shadow:0 32px 80px rgba(0,0,0,0.4);text-align:center;}
.login-logo{height:56px;object-fit:contain;margin-bottom:24px;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--gray);margin-bottom:28px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Heebo',sans-serif;font-size:14px;outline:none;margin-bottom:12px;
  color:var(--black);transition:border-color 0.18s;}
.form-input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:13px;border-radius:14px;border:none;background:var(--black);
  color:var(--white);font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.18s;}
.btn-login:hover{background:#2E2924;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--black);
  display:flex;flex-direction:column;position:fixed;top:0;right:0;z-index:100;}
.sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-between;}
.sb-logo img{height:36px;object-fit:contain;filter:brightness(0) invert(1);}
.sb-badge{background:var(--burgundy);color:white;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:100px;letter-spacing:0.05em;}
.sb-nav{flex:1;padding:8px 0;}
.sb-section{padding:14px 18px 5px;font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 18px;
  color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;transition:all 0.18s;
  border:none;background:none;width:100%;text-align:right;font-family:'Heebo',sans-serif;position:relative;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.05);}
.nav-item.active{color:var(--gold);background:rgba(200,169,126,0.12);}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--gold);border-radius:0 2px 2px 0;}
.sb-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);}

.mobile-topbar{display:none;position:sticky;top:0;z-index:150;background:var(--black);
  height:52px;padding:0 16px;align-items:center;justify-content:space-between;}
.mobile-topbar img{height:32px;filter:brightness(0) invert(1);}
.hamburger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;}
.hamburger span{width:22px;height:2px;background:white;border-radius:2px;display:block;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99;}
.sb-overlay.open{display:block;}

.main{margin-right:var(--sidebar-w);flex:1;}
.page-header{padding:24px 28px 0;display:flex;align-items:flex-start;
  justify-content:space-between;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;}
.page-sub{font-size:13px;color:var(--gray);margin-top:3px;}
.page-body{padding:18px 28px 60px;}

/* CARDS */
.card{background:var(--white);border-radius:18px;border:1px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:20px;}
.stat-card{padding:18px 20px;border-radius:14px;background:var(--white);
  border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.05);}
.stat-card.dark{background:var(--black);border:none;}
.stat-icon{margin-bottom:10px;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;line-height:1;color:var(--black);}
.stat-val.white{color:var(--white);}
.stat-val.gold{color:var(--gold);}
.stat-lbl{font-size:12px;color:var(--gray);margin-top:4px;}
.stat-lbl.white{color:rgba(255,255,255,0.6);}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}

/* TABLE */
.table-wrap{background:var(--white);border-radius:18px;border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
table{width:100%;border-collapse:collapse;}
thead{background:#F3EDE4;}
th{padding:11px 16px;text-align:right;font-size:11px;font-weight:700;color:var(--gray);
  text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid #F5EDE8;transition:background 0.15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--ivory);}
td{padding:13px 16px;font-size:13px;vertical-align:middle;}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-green{background:#E8F4EF;color:var(--green);}
.badge-amber{background:#FDF6E3;color:var(--amber);}
.badge-gray{background:#F3EDE4;color:var(--gray);}
.badge-red{background:#FBEAEC;color:var(--red);}
.badge-gold{background:var(--gold-pale);color:#8B6530;}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:9px 18px;border-radius:12px;font-family:'Heebo',sans-serif;font-size:13px;
  font-weight:600;cursor:pointer;border:none;transition:all 0.18s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:white;}
.btn-gold:hover{background:#B8905C;}
.btn-ghost{background:transparent;color:var(--gray);border:1.5px solid var(--border);}
.btn-ghost:hover{background:var(--ivory);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:10px;}
.btn-dark{background:var(--black);color:white;}

/* SEARCH */
.search-wrap{position:relative;}
.search-wrap input{width:100%;padding:9px 36px 9px 12px;border:1.5px solid var(--border);
  border-radius:12px;font-family:'Heebo',sans-serif;font-size:13px;outline:none;
  direction:rtl;background:var(--white);transition:border-color 0.18s;}
.search-wrap input:focus{border-color:var(--gold);}
.si{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--gray-light);pointer-events:none;}

/* MINI CHART */
.mini-chart{display:flex;align-items:flex-end;gap:5px;height:60px;}
.mc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.mc-bar{width:100%;border-radius:3px 3px 0 0;background:var(--gold);}
.mc-lbl{font-size:9px;color:var(--gray-light);}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:var(--black);color:white;padding:11px 20px;border-radius:10px;
  font-size:13px;white-space:nowrap;animation:tIn 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.toast.success{background:#1B5E20;}
.toast.error{background:#B71C1C;}
@keyframes tIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* SECTION TITLE */
.sec-title{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;
  letter-spacing:0.07em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* PROGRESS */
.prog-track{background:var(--border);border-radius:100px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;background:var(--gold);transition:width 0.6s;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(31,31,31,0.6);backdrop-filter:blur(8px);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity 0.22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:22px;padding:26px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);
  transform:translateY(16px);transition:transform 0.22s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#F3EDE4;
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(100%);transition:transform 0.28s ease;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-right:0;}
  .mobile-topbar{display:flex;}
  .page-header{padding:14px 16px 0;}
  .page-body{padding:14px 16px 60px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .hide-mob{display:none;}
}
</style>
</head>

<script>
const SUPABASE_URL = 'https://yzjhwnqqusqjctnqktqv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6amh3bnFxdXNxamN0bnFrdHF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTMxNzcsImV4cCI6MjA5NzY2OTE3N30.uaNM3-yAVuGrIbHqSsQhs1uZGKr4yM2d2MLedLklHNA';
const OWNER_PASS = 'wedjoy2025'; // שנה לסיסמה שלך
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allUsers    = [];
let allEvents   = [];
let allContacts = [];
let allGuests   = [];
let userSearch  = '';
let currentPage = 'overview';

// ── AUTH ─────────────────────────────────────────────────
function doOwnerLogin() {
  try {
    const passEl = document.getElementById('ownerPass');
    if (!passEl) { alert('שגיאה: שדה סיסמה לא נמצא'); return; }
    const pass = passEl.value.trim();
    if (!pass) { showLoginError('נא להכניס סיסמה'); return; }
    if (pass !== OWNER_PASS) { showLoginError('סיסמה שגויה — נסה: wedjoy2025'); return; }
    localStorage.setItem('wj_owner','1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'flex';
    loadAll();
  } catch(e) {
    alert('שגיאה: ' + e.message);
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 3000);
}

function doLogout() {
  localStorage.removeItem('wj_owner');
  document.getElementById('appScreen').style.display   = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}

window.onload = () => {
  // Attach login button
  var loginBtn = document.getElementById('loginBtn');
  if (loginBtn) {
    loginBtn.addEventListener('click', function() {
      var pass = document.getElementById('ownerPass').value.trim();
      var err  = document.getElementById('loginError');
      if (!pass) { err.textContent='נא להכניס סיסמה'; err.style.display='block'; return; }
      if (pass !== OWNER_PASS) { err.textContent='סיסמה שגויה'; err.style.display='block'; return; }
      err.style.display='none';
      localStorage.setItem('wj_owner','1');
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appScreen').style.display='flex';
      loadAll();
    });
  }
  var passInput = document.getElementById('ownerPass');
  if (passInput) {
    passInput.addEventListener('keydown', function(e) {
      if (e.key==='Enter') document.getElementById('loginBtn').click();
    });
  }

  // Check if already logged in 
  if (localStorage.getItem('wj_owner')==='1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'flex';
    loadAll();
  }
};

// ── LOAD ─────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('pageContent').innerHTML =
    '<div style="text-align:center;padding:80px;color:var(--gray);"><div style="width:36px;height:36px;border:3px solid #E7D7C1;border-top-color:#C8A97E;border-radius:50%;animation:tIn 0.8s linear infinite;margin:0 auto 14px;"></div>טוען נתונים...</div>';

  const [u, ev, ct, gs] = await Promise.all([
    sb.from('users').select('*').order('created_at',{ascending:false}),
    sb.from('events').select('*').order('created_at',{ascending:false}),
    sb.from('contacts').select('*'),
    sb.from('guests').select('*'),
  ]);

  allUsers    = u.data  || [];
  allEvents   = ev.data || [];
  allContacts = ct.data || [];
  allGuests   = gs.data || [];

  renderPage('overview');
}

// ── ROUTER ────────────────────────────────────────────────
function showPage(name, btn) {
  currentPage = name;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const nb = btn || document.getElementById('nav-'+name);
  if (nb) nb.classList.add('active');
  closeSB();
  renderPage(name);
}

function renderPage(name) {

            ['LUXURY',allUsers.filter(u=>{const ev=allEvents.find(e=>e.user_id===u.id);return allContacts.filter(c=>c.event_id===ev?.id).length>250;}).length,'badge-green'],
          ].map(([name,count,cls])=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F5EDE8;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="badge ${cls}">${name}</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="prog-track" style="width:80px;">
                  <div class="prog-fill" style="width:${allUsers.length>0?Math.round(count/allUsers.length*100):0}%;"></div>
                </div>
                <span style="font-size:13px;font-weight:600;min-width:20px;">${count}</span>
              </div>
            </div>`).join('')}
        </div>

        <div class="card">
          <div class="sec-title">סטטוס אישורים</div>
          ${[['אישרו הגעה',confirmed,'#1F7A5A'],
            ['לא מגיעים',declined,'#B23A48'],
            ['ממתינים',totalContacts-confirmed-declined,'#D4A017'],
          ].map(([l,n,c])=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F5EDE8;">
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:10px;height:10px;border-radius:50%;background:${c};flex-shrink:0;"></div>
                <span style="font-size:13px;">${l}</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="prog-track" style="width:80px;">
                  <div class="prog-fill" style="width:${totalContacts>0?Math.round(n/totalContacts*100):0}%;background:${c};"></div>
                </div>
                <span style="font-size:13px;font-weight:600;min-width:24px;">${n}</span>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <!-- Category breakdown -->
      ${Object.keys(cats).length>0?`
      <div class="sec-title">פילוח קטגוריות מוזמנים</div>
      <div class="card">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;">
          ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,n])=>`
            <div>
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;">
                <span>${cat}</span><span style="font-weight:600;">${n}</span>
              </div>
              <div class="prog-track">
                <div class="prog-fill" style="width:${Math.round(n/totalContacts*100)}%;"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>` : ''}
    </div>`;
}

// ── USER DETAIL MODAL ─────────────────────────────────────
function showUserDetail(userId) {
  const u    = allUsers.find(x=>x.id===userId);
  if (!u) return;
  const ev   = allEvents.find(e=>e.user_id===u.id);
  const contacts = allContacts.filter(c=>c.event_id===ev?.id);
  const guests   = allGuests.filter(g=>g.event_id===ev?.id);
  const confirmed= guests.filter(g=>g.status==='confirmed');
  const declined = guests.filter(g=>g.status==='declined');
  const plan = contacts.length>250?'LUXURY':contacts.length>100?'PREMIUM':'FREE';

  document.getElementById('modalUserTitle').textContent = `${u.bride_name} ו${u.groom_name}`;
  document.getElementById('modalUserContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      ${[['אימייל',u.email],['טלפון',u.phone||'—'],
        ['תאריך אירוע',ev?.event_date?new Date(ev.event_date).toLocaleDateString('he-IL'):'לא הוגדר'],
        ['אולם',ev?.venue||'לא הוגדר'],
        ['עיר',ev?.city||'—'],['תוכנית',plan]].map(([l,v])=>`
        <div style="background:var(--ivory);border-radius:10px;padding:12px;">
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px;">${l}</div>
          <div style="font-size:13px;font-weight:600;">${v}</div>
        </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
      ${[['ברשימת הזמנה',contacts.length,'var(--black)'],
        ['אישרו הגעה',confirmed.length,'var(--green)'],
        ['לא מגיעים',declined.length,'var(--red)']].map(([l,v,c])=>`
        <div style="background:var(--ivory);border-radius:10px;padding:12px;text-align:center;">
          <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:${c};">${v}</div>
          <div style="font-size:11px;color:var(--gray);">${l}</div>
        </div>`).join('')}
    </div>
    ${contacts.length>0?`
    <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">
      אנשי קשר (${contacts.length})
    </div>
    <div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
      ${contacts.slice(0,20).map(c=>{
        const g = guests.find(x=>x.contact_id===c.id);
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--ivory);border-radius:10px;">
          <div style="flex:1;font-size:13px;font-weight:500;">${c.first_name} ${c.last_name}</div>
          <div style="font-size:11px;color:var(--gray);direction:ltr;">${c.phone||''}</div>
          <span class="badge ${g?.status==='confirmed'?'badge-green':g?.status==='declined'?'badge-red':'badge-gray'}">
            ${g?.status==='confirmed'?'✓ מגיע':g?.status==='declined'?'✗ לא מגיע':'ממתין'}
          </span>
        </div>`;
      }).join('')}
    </div>` : ''}`;

  openModal('modalUser');
}

// ── EXPORT ────────────────────────────────────────────────
function exportUsers() {
  const rows = allUsers.map(u=>{
    const ev = allEvents.find(e=>e.user_id===u.id);
    const ct = allContacts.filter(c=>c.event_id===ev?.id).length;
    const cf = allGuests.filter(g=>g.event_id===ev?.id&&g.status==='confirmed').length;
    return [u.bride_name,u.groom_name,u.email,u.phone||'',
      ev?.event_date||'',ev?.venue||'',ct,cf,
      new Date(u.created_at).toLocaleDateString('he-IL')].join(',');
  });
  const csv = ['שם כלה,שם חתן,אימייל,טלפון,תאריך,אולם,מוזמנים,אישרו,נרשמו',...rows].join('
');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wedjoy_users_'+new Date().toLocaleDateString('he-IL')+'.csv';
  a.click();
  toast('ייצוא הצליח ✓','success');
}

// ── UTILS ─────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openSB()       { document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOverlay').classList.add('open'); }
function closeSB()      { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open'); }
function toast(msg, type='') {
  const c=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
</script>
