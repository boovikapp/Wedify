<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{direction:rtl;background:#0A0C0F;}
body{font-family:'Heebo',sans-serif;background:#0A0C0F;color:#F8FAFC;
  min-height:100vh;-webkit-font-smoothing:antialiased;
  overscroll-behavior:none;}

/* TOP BAR */
.topbar{background:#111318;border-bottom:2px solid rgba(200,169,126,0.3);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  padding-top:max(12px,env(safe-area-inset-top));}
.topbar img{height:30px;}
.event-name{font-size:15px;font-weight:800;color:#F8FAFC;text-align:center;flex:1;}
.top-stats{display:flex;gap:12px;align-items:center;}
.top-stat{text-align:center;}
.top-stat-num{font-size:18px;font-weight:800;line-height:1;}
.top-stat-lbl{font-size:9px;color:rgba(248,250,252,0.5);}

/* SEARCH */
.search-bar{padding:12px 16px;background:#111318;border-bottom:1px solid rgba(200,169,126,0.1);
  position:sticky;top:56px;z-index:40;}
.search-input{width:100%;padding:12px 16px;border-radius:14px;
  border:1.5px solid rgba(200,169,126,0.2);background:#1A1D24;
  color:#F8FAFC;font-family:'Heebo',sans-serif;font-size:16px;
  outline:none;}
.search-input::placeholder{color:rgba(248,250,252,0.3);}
.search-input:focus{border-color:#C8A97E;}

/* TABS */
.tabs{display:flex;background:#111318;border-bottom:1px solid rgba(200,169,126,0.1);
  position:sticky;top:112px;z-index:39;}
.tab-btn{flex:1;padding:12px;font-family:'Heebo',sans-serif;font-size:13px;
  font-weight:600;border:none;background:transparent;
  color:rgba(248,250,252,0.5);border-bottom:2px solid transparent;cursor:pointer;}
.tab-btn.active{color:#C8A97E;border-bottom-color:#C8A97E;}

/* GUEST LIST */
.list{padding:8px 12px 80px;}
.guest-row{display:flex;align-items:center;gap:12px;
  padding:14px 12px;border-radius:14px;margin-bottom:6px;
  background:#171A21;border:1px solid rgba(248,250,252,0.05);
  cursor:pointer;transition:all 0.15s;}
.guest-row:active{background:#1E2028;}
.guest-row.arrived{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.05);}
.av{width:44px;height:44px;border-radius:50%;background:rgba(200,169,126,0.1);
  border:1.5px solid rgba(200,169,126,0.2);display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;color:#C8A97E;flex-shrink:0;}
.av.confirmed{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#22C55E;}
.guest-info{flex:1;}
.guest-name{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:2px;}
.guest-meta{font-size:12px;color:rgba(248,250,252,0.45);}
.guest-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.tbl-chip{background:rgba(200,169,126,0.15);border:1px solid rgba(200,169,126,0.3);
  color:#C8A97E;font-size:13px;font-weight:700;padding:4px 10px;border-radius:100px;}
.badge{display:inline-flex;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.badge-green{background:rgba(34,197,94,0.12);color:#22C55E;}
.badge-amber{background:rgba(245,158,11,0.12);color:#F59E0B;}
.badge-gray{background:rgba(248,250,252,0.06);color:rgba(248,250,252,0.4);}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:700;color:#F8FAFC;margin-bottom:6px;}
.empty-sub{font-size:13px;color:rgba(248,250,252,0.4);}

/* LOADING */
.loading{text-align:center;padding:60px 24px;}
.spinner{width:36px;height:36px;border:3px solid rgba(200,169,126,0.2);
  border-top-color:#C8A97E;border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* BOTTOM ACTION */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;
  background:#111318;border-top:1px solid rgba(200,169,126,0.15);
  padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex;gap:10px;}
.btn-gold{background:#C8A97E;color:#111;border:none;border-radius:12px;
  padding:13px 20px;font-family:'Heebo',sans-serif;font-size:14px;
  font-weight:700;cursor:pointer;flex:1;}
.btn-ghost{background:transparent;color:rgba(248,250,252,0.6);
  border:1.5px solid rgba(248,250,252,0.1);border-radius:12px;
  padding:13px 16px;font-family:'Heebo',sans-serif;font-size:13px;
  font-weight:600;cursor:pointer;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{width:100%;max-width:380px;background:#171A21;border:1px solid rgba(200,169,126,0.15);border-radius:24px;padding:28px;}
.form-label{font-size:12px;font-weight:600;color:rgba(248,250,252,0.5);display:block;margin-bottom:6px;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid rgba(248,250,252,0.08);border-radius:12px;background:#1E2028;color:#F8FAFC;font-family:'Heebo',sans-serif;font-size:14px;outline:none;margin-bottom:14px;}
.form-input:focus{border-color:#C8A97E;}
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#EF4444;margin-bottom:14px;display:none;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#171A21;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;}
.modal-title{font-size:18px;font-weight:800;color:#F8FAFC;margin-bottom:16px;}
.companions-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;}
.comp-btn{padding:10px;border-radius:10px;border:1.5px solid rgba(248,250,252,0.1);background:transparent;color:rgba(248,250,252,0.6);font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.comp-btn.sel{border-color:#C8A97E;background:rgba(200,169,126,0.15);color:#C8A97E;}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://yzjhwnqqusqjctnqktqv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6amh3bnFxdXNxamN0bnFrdHF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTMxNzcsImV4cCI6MjA5NzY2OTE3N30.uaNM3-yAVuGrIbHqSsQhs1uZGKr4yM2d2MLedLklHNA';
const sb = supabase.createClient(SB_URL, SB_KEY);

function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

let me=null, eventData=null, contacts=[], guests=[], curTab='all', selContact=null;
let authToken=null;

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  err.style.display='none';
  if(!email||!pass){ err.textContent='נא למלא אימייל וסיסמה'; err.style.display='block'; return; }
  btn.textContent='מתחברים...'; btn.disabled=true;
  try {
    const resp = await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password:pass})
    });
    const json = await resp.json();
    btn.textContent='כניסה ←'; btn.disabled=false;
    if(!resp.ok||json.error){ err.textContent=json.error_description||'אימייל או סיסמה שגויים'; err.style.display='block'; return; }
    authToken = json.access_token;
    localStorage.setItem('ld_token', authToken);
    await loadApp(json.user.id);
  } catch(e) {
    btn.textContent='כניסה ←'; btn.disabled=false;
    err.textContent='שגיאת רשת'; err.style.display='block';
  }
}

// ── LOAD ──
async function loadApp(userId) {
  const {data:profile} = await sb.from('users').select('*').eq('auth_id', userId).single();
  if(!profile){ return; }
  me = profile;
  const {data:ev} = await sb.from('events').select('*').eq('user_id', profile.id).single();
  eventData = ev;
  if(ev) {
    document.getElementById('eventName').textContent = (profile.bride_name||'') + ' ו' + (profile.groom_name||'');
    const [cs, gs] = await Promise.all([
      sb.from('contacts').select('*').eq('event_id', ev.id),
      sb.from('guests').select('*').eq('event_id', ev.id)
    ]);
    contacts = cs.data||[];
    guests   = gs.data||[];
  }
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  updateStats();
  renderList();
}

// ── STATS ──
function updateStats() {
  // "הגיעו" (arrived) must reflect actual door check-in (contacts.checked_in, the same
  // field scan.html writes), not guests.status — that field means "RSVP'd yes" and is a
  // separate concept (see confirmArrival()).
  const arrived = contacts.filter(c=>c.checked_in).length;
  const pend = contacts.filter(c=>!guests.find(g=>g.contact_id===c.id)).length;
  document.getElementById('statConfirmed').textContent = arrived;
  document.getElementById('statPending').textContent = pend;
}

// ── TABS ──
function setTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderList();
}

// ── RENDER LIST ──
function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('guestList');
  
  // Merge contacts + guests
  let items = contacts.map(c => {
    const g = guests.find(x=>x.contact_id===c.id);
    return {...c, guest: g, status: g?.status||'pending', table_number: g?.table_number};
  });

  // Filter by tab
  if (curTab==='confirmed') items = items.filter(i=>i.status==='confirmed');
  else if (curTab==='pending')   items = items.filter(i=>i.status==='pending');
  else if (curTab==='declined')  items = items.filter(i=>i.status==='declined');

  // Filter by search
  if (q) items = items.filter(i=>(i.first_name+' '+i.last_name).toLowerCase().includes(q));

  // Sort: pending first, then confirmed, then declined
  items.sort((a,b) => {
    const order = {pending:0,confirmed:1,declined:2};
    return (order[a.status]||0)-(order[b.status]||0);
  });

  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>
      <div class="empty-title">לא נמצאו תוצאות</div>
      <div class="empty-sub">נסו לחפש בשם אחר</div></div>`;
    return;
  }

  list.innerHTML = items.map(c => {
    const initials = escapeHtml((c.first_name[0]||'')+(c.last_name?.[0]||''));
    // "Arrived" (green check) reflects actual door check-in (c.checked_in, written by
    // confirmArrival()/scan.html), separate from c.status which is the pre-event RSVP answer.
    const badge = c.checked_in
      ? `<span class="badge badge-green">✓ הגיע</span>`
      : c.status==='confirmed'
      ? `<span class="badge badge-amber">אישר/ה, טרם הגיע/ה</span>`
      : c.status==='declined'
      ? `<span class="badge badge-gray">לא מגיע</span>`
      : `<span class="badge badge-amber">ממתין</span>`;
    const tbl = c.table_number ? `<div class="tbl-chip">שולחן ${escapeHtml(c.table_number)}</div>` : '';
    return `<div class="guest-row ${c.checked_in?'arrived':''}" onclick="openGuest('${c.id}')">
      <div class="av ${c.checked_in?'confirmed':''}">${initials}</div>
      <div class="guest-info">
        <div class="guest-name">${escapeHtml(c.first_name)} ${escapeHtml(c.last_name||'')}</div>
        <div class="guest-meta">${escapeHtml(c.category||'')} · ${c.guests_count||1} מוזמנים</div>
      </div>
      <div class="guest-right">${badge}${tbl}</div>
    </div>`;
  }).join('');
}

// ── GUEST MODAL ──
function openGuest(id) {
  selContact = contacts.find(c=>c.id===id);
  if(!selContact) return;
  const g = guests.find(x=>x.contact_id===id);
  document.getElementById('modalGuestName').textContent = selContact.first_name+' '+(selContact.last_name||'');
  document.getElementById('modalGuestMeta').textContent = 
    (selContact.category||'')+' · שולחן '+(g?.table_number||'לא שובץ');
  
  const max = selContact.guests_count||1;
  const curr = g?.companions!==undefined ? g.companions+1 : max;
  const grid = document.getElementById('compGrid');
  grid.innerHTML = Array.from({length:Math.min(max,10)},(_,i)=>i+1).map(n=>
    `<button class="comp-btn ${n===curr?'sel':''}" onclick="selComp(this,${n})">${n}</button>`
  ).join('');
  
  document.getElementById('guestModal').classList.add('open');
}

function selComp(btn, n) {
  document.querySelectorAll('.comp-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function closeModal() {
  document.getElementById('guestModal').classList.remove('open');
  selContact = null;
}

async function confirmArrival() {
  if(!selContact) return;
  const selBtn = document.querySelector('.comp-btn.sel');
  const companions = selBtn ? parseInt(selBtn.textContent)-1 : 0;

  // Actual door arrival is tracked on contacts.checked_in / checked_in_at — the SAME fields
  // scan.html uses — so both tools agree on who has physically arrived. We deliberately do
  // NOT write guests.status here: that field means "RSVP'd yes before the event" (set via
  // book.html) and must not be overwritten by a door check-in action.
  const nowIso = new Date().toISOString();
  await sb.from('contacts').update({checked_in:true, checked_in_at:nowIso}).eq('id',selContact.id);
  selContact.checked_in = true; selContact.checked_in_at = nowIso;
  const cRef = contacts.find(c=>c.id===selContact.id);
  if(cRef){ cRef.checked_in = true; cRef.checked_in_at = nowIso; }

  const existing = guests.find(g=>g.contact_id===selContact.id);
  if(existing) {
    // Only the actual-companions headcount is updated here; the RSVP status is left untouched.
    await sb.from('guests').update({companions}).eq('id',existing.id);
    existing.companions=companions;
  } else {
    // No prior RSVP record (walk-in) — create one so companions/table-count logic still works.
    const {data} = await sb.from('guests').insert({
      event_id: eventData.id,
      contact_id: selContact.id,
      first_name: selContact.first_name,
      last_name: selContact.last_name||'',
      phone: selContact.phone,
      status:'confirmed', companions
    }).select().single();
    if(data) guests.push(data);
  }
  closeModal();
  updateStats();
  renderList();
}

async function declineArrival() {
  if(!selContact) return;
  const existing = guests.find(g=>g.contact_id===selContact.id);
  if(existing) {
    await sb.from('guests').update({status:'declined'}).eq('id',existing.id);
    existing.status='declined';
  } else {
    const {data} = await sb.from('guests').insert({
      event_id: eventData.id,
      contact_id: selContact.id,
      first_name: selContact.first_name,
      last_name: selContact.last_name||'',
      phone: selContact.phone,
      status:'declined', companions:0
    }).select().single();
    if(data) guests.push(data);
  }
  closeModal();
  updateStats();
  renderList();
}

async function refreshData() {
  if(!eventData) return;
  const [cs,gs] = await Promise.all([
    sb.from('contacts').select('*').eq('event_id',eventData.id),
    sb.from('guests').select('*').eq('event_id',eventData.id)
  ]);
  contacts=cs.data||[]; guests=gs.data||[];
  updateStats(); renderList();
}

// ── AUTO LOGIN ──
window.onload = async () => {
  const saved = localStorage.getItem('ld_token');
  if(saved) {
    try {
      const resp = await fetch(SB_URL+'/auth/v1/user',{
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+saved}
      });
      if(resp.ok) {
        const user = await resp.json();
        authToken = saved;
        await loadApp(user.id);
        return;
      }
    } catch(e) {}
    localStorage.removeItem('ld_token');
  }
};

document.addEventListener('touchend',function(e){var n=Date.now();if(n-_lt<300)e.preventDefault();_lt=n;},{passive:false});
