<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WedJoy — ניהול האירוע</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold:#C8A97E; --gold-h:#B8905C; --gold-pale:#F5EDE0; --gold-border:#E7D7C1;
  --burgundy:#6D1F2F; --ivory:#FAF7F2; --white:#FFFFFF;
  --black:#1F1F1F; --charcoal:#2E2924; --gray:#7A746E; --gray-light:#B8B2AC;
  --border:#E7D7C1; --green:#1F7A5A; --red:#B23A48; --amber:#D4A017; --purple:#A46FB6;
  --sidebar-w:248px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{direction:rtl;}
body{font-family:'Heebo',sans-serif;background:var(--ivory);color:var(--black);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
input,select,textarea,button{font-family:'Heebo',sans-serif;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 60% at 30% 20%,rgba(200,169,126,0.18) 0%,transparent 60%),var(--black);}
.auth-box{background:var(--white);border-radius:24px;padding:36px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.4);}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo img{height:56px;object-fit:contain;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;text-align:center;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Heebo',sans-serif;font-size:14px;outline:none;color:var(--black);background:var(--white);
  transition:border-color 0.18s;}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,126,0.15);}
select.form-input{cursor:pointer;}
textarea.form-input{resize:vertical;min-height:72px;}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--gray);}
.auth-switch a{color:var(--gold);font-weight:600;cursor:pointer;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;
  border-radius:14px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;border:none;transition:all 0.18s;white-space:nowrap;}
.btn svg{flex-shrink:0;}
.btn-gold{background:var(--gold);color:var(--white);box-shadow:0 4px 16px rgba(200,169,126,0.35);}
.btn-gold:hover{background:var(--gold-h);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--gray);border:1.5px solid var(--border);}
.btn-ghost:hover{background:var(--ivory);color:var(--black);}
.btn-dark{background:var(--black);color:var(--white);}
.btn-dark:hover{background:var(--charcoal);}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid #F5C2C8;}
.btn-danger:hover{background:#FFF0F0;}
.btn-green{background:var(--green);color:var(--white);}
.btn-sm{padding:7px 16px;font-size:13px;border-radius:10px;}
.btn-xs{padding:5px 12px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}

/* APP LAYOUT */
.app-layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--black);display:flex;
  flex-direction:column;position:fixed;top:0;right:0;z-index:200;transition:transform 0.28s ease;}
.sidebar-logo{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-between;}
.sidebar-logo img{height:38px;object-fit:contain;filter:brightness(0) invert(1);}
.sidebar-close{display:none;background:none;border:none;color:rgba(255,255,255,0.5);font-size:20px;cursor:pointer;padding:4px;}
.sidebar-event{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-names{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:var(--white);margin-bottom:2px;}
.sidebar-names em{color:var(--gold);font-style:italic;}
.sidebar-sub{font-size:11px;color:rgba(255,255,255,0.4);}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-section{padding:16px 20px 6px;font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;
  color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;transition:all 0.18s;
  border:none;background:none;width:100%;text-align:right;font-family:'Heebo',sans-serif;position:relative;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.05);}
.nav-item.active{color:var(--gold);background:rgba(200,169,126,0.12);}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--gold);border-radius:0 2px 2px 0;}
.nav-item svg{flex-shrink:0;opacity:0.8;}
.nav-item.active svg{opacity:1;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);}

/* MOBILE TOPBAR */
.mobile-topbar{display:none;position:sticky;top:0;z-index:150;background:var(--black);
  height:54px;padding:0 16px;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.08);}
.mobile-topbar img{height:36px;object-fit:contain;filter:brightness(0) invert(1);}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:199;}
.sidebar-overlay.open{display:block;}

/* MAIN */
.main-content{margin-right:var(--sidebar-w);flex:1;min-height:100vh;}
.page-header{padding:24px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;line-height:1.1;}
.page-sub{font-size:13px;color:var(--gray);margin-top:3px;}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.page-body{padding:20px 28px 60px;}

/* CARDS */
.card{background:var(--white);border-radius:20px;border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,0.06);padding:22px;}
.card-sm{padding:16px;border-radius:14px;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:var(--white);border-radius:14px;padding:18px 20px;
  border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.05);}
.stat-card.featured{background:var(--burgundy);border:none;box-shadow:0 4px 20px rgba(109,31,47,0.25);}
.stat-icon{margin-bottom:12px;color:var(--gold);}
.stat-icon.white{color:rgba(255,255,255,0.8);}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;line-height:1;color:var(--black);}
.stat-value.white{color:var(--white);}
.stat-label{font-size:12px;color:var(--gray);margin-top:4px;}
.stat-label.white{color:rgba(255,255,255,0.7);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:100px;font-size:12px;font-weight:500;white-space:nowrap;}
.badge-green{background:#E8F4EF;color:var(--green);}
.badge-red{background:#FBEAEC;color:var(--red);}
.badge-amber{background:#FDF6E3;color:var(--amber);}
.badge-gold{background:var(--gold-pale);color:#8B6530;}
.badge-gray{background:#F3EDE4;color:var(--gray);}
.badge-purple{background:#F5EEF8;color:var(--purple);}
.badge-blue{background:#E3F2FD;color:#1565C0;}
.badge-burgundy{background:#F5E8EA;color:var(--burgundy);}

/* TABLE */
.table-wrap{background:var(--white);border-radius:20px;border:1px solid var(--border);
  overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.06);}
table{width:100%;border-collapse:collapse;}
thead{background:#F3EDE4;}
th{padding:11px 16px;text-align:right;font-size:11px;font-weight:700;color:var(--gray);
  text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid #F5EDE8;transition:background 0.15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--ivory);}
td{padding:13px 16px;font-size:14px;vertical-align:middle;}

/* AVATAR */
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold-pale),#D8B98E);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#8B6530;}
.avatar-sm{width:28px;height:28px;font-size:10px;}

/* SEARCH */
.search-wrap{position:relative;}
.search-wrap input{width:100%;padding:10px 38px 10px 14px;border:1.5px solid var(--border);
  border-radius:12px;font-family:'Heebo',sans-serif;font-size:13px;outline:none;
  direction:rtl;background:var(--white);transition:border-color 0.18s;}
.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,126,0.12);}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--gray-light);pointer-events:none;}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{padding:5px 14px;border-radius:100px;font-size:12px;cursor:pointer;
  border:1.5px solid var(--border);background:var(--white);color:var(--gray);
  font-family:'Heebo',sans-serif;transition:all 0.18s;font-weight:500;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.active{border-color:var(--gold);background:var(--gold-pale);color:#8B6530;font-weight:600;}

/* PROGRESS */
.progress-track{background:var(--border);border-radius:100px;height:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;background:var(--gold);transition:width 0.6s ease;}

/* RSVP BAR */
.rsvp-bar{display:flex;height:10px;border-radius:100px;overflow:hidden;gap:2px;}
.rsvp-yes{background:var(--green);border-radius:100px 0 0 100px;}
.rsvp-no{background:var(--red);}
.rsvp-wait{background:var(--border);border-radius:0 100px 100px 0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(31,31,31,0.6);
  backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;
  justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:24px;padding:28px;width:100%;
  max-width:500px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.25);
  transform:translateY(16px);transition:transform 0.22s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;
  background:#F3EDE4;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  color:var(--gray);transition:background 0.15s;}
.modal-close:hover{background:var(--border);}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:var(--black);color:var(--white);padding:12px 22px;border-radius:12px;
  font-size:13px;white-space:nowrap;animation:toastIn 0.3s ease;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);font-weight:500;}
.toast.success{background:#1B5E20;}
.toast.error{background:#B71C1C;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* SECTION TITLE */
.section-title{font-size:13px;font-weight:700;color:var(--gray);text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:56px 24px;color:var(--gray);}
.empty-icon{margin-bottom:14px;color:var(--border);}
.empty-title{font-size:16px;font-weight:600;color:var(--black);margin-bottom:6px;}
.empty-sub{font-size:13px;margin-bottom:20px;}

/* GUEST CARD */
.guest-card{background:var(--white);border-radius:16px;padding:14px 16px;
  border:1px solid var(--border);display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);transition:box-shadow 0.15s;}
.guest-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);}

/* CONTACT CARD */
.contact-card{background:var(--white);border-radius:16px;padding:14px 16px;
  border:1px solid var(--border);display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);transition:all 0.15s;}
.contact-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.contact-card.sent{border-color:#C8E6C9;}

/* EVENT BANNER */
.event-banner{background:linear-gradient(135deg,var(--black) 0%,#2a2420 100%);
  border-radius:20px;padding:24px 28px;margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.event-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;
  color:var(--white);line-height:1.1;margin-bottom:8px;}
.event-name em{color:var(--gold);font-style:italic;}
.event-meta{display:flex;gap:16px;flex-wrap:wrap;}
.event-meta-item{display:flex;align-items:center;gap:6px;font-size:12px;
  color:rgba(255,255,255,0.55);}
.event-meta-item svg{color:var(--gold);opacity:0.7;}

/* DASHED BOX */
.dashed-box{border:2px dashed var(--border);border-radius:18px;padding:28px;
  text-align:center;background:transparent;}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--gray);}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MINI CHART */
.mini-chart{display:flex;align-items:flex-end;gap:6px;height:64px;}
.mini-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.mini-bar{width:100%;border-radius:3px 3px 0 0;background:var(--gold);}
.mini-lbl{font-size:9px;color:var(--gray-light);}

/* STATUS DOT */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-green{background:var(--green);}
.dot-red{background:var(--red);}
.dot-amber{background:var(--amber);}
.dot-gray{background:var(--border);}

/* WHATSAPP BUTTON */
.wa-btn{background:#25D366;color:var(--white);display:inline-flex;align-items:center;
  gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;transition:all 0.18s;}
.wa-btn:hover{background:#1FAD54;transform:translateY(-1px);}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-close{display:block;}
  .main-content{margin-right:0;}
  .mobile-topbar{display:flex;}
  .page-header{padding:16px 16px 0;}
  .page-body{padding:14px 16px 60px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .hide-mobile{display:none;}
  .page-title{font-size:22px;}
}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- ── LOGIN ── -->
<div id="loginScreen" class="auth-screen" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo"><img id="logoLogin" src="" alt="WedJoy"></div>
    <div class="auth-title">התחברות</div>
    <div class="auth-sub">שמחים שחזרתם 👋</div>
    <div class="form-group">
      <label class="form-label">אימייל</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="your@email.com" dir="ltr">
    </div>
    <div class="form-group">
      <label class="form-label">סיסמה</label>
      <input class="form-input" id="loginPass" type="password" placeholder="הסיסמה שלכם" dir="ltr"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-gold btn-full" onclick="doLogin()" id="loginBtn">התחברות ←</button>
    <div class="auth-switch">אין לכם חשבון? <a onclick="showScreen('register')">הירשמו כאן</a></div>
  </div>
</div>

<!-- ── REGISTER ── -->
<div id="registerScreen" class="auth-screen" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo"><img id="logoRegister" src="" alt="WedJoy"></div>
    <div class="auth-title">יצירת חשבון</div>
    <div class="auth-sub">ניהול החתונה שלכם מתחיל כאן</div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">שם החתן *</label>
        <input class="form-input" id="regGroom" placeholder="ישראל">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">שם הכלה *</label>
        <input class="form-input" id="regBride" placeholder="ישראלה">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">טלפון</label>
      <input class="form-input" id="regPhone" type="tel" placeholder="050-0000000" dir="ltr">
    </div>
    <div class="form-group">
      <label class="form-label">אימייל *</label>
      <input class="form-input" id="regEmail" type="email" placeholder="your@email.com" dir="ltr">
    </div>
    <div class="form-group">
      <label class="form-label">סיסמה *</label>
      <input class="form-input" id="regPass" type="password" placeholder="לפחות 6 תווים" dir="ltr">
    </div>
    <div class="form-group">
      <label class="form-label">אימות סיסמה *</label>
      <input class="form-input" id="regPass2" type="password" placeholder="הכניסו שוב" dir="ltr">
    </div>
    <button class="btn btn-gold btn-full" onclick="doRegister()" id="regBtn">יצירת חשבון ←</button>
    <div class="auth-switch">כבר יש לכם חשבון? <a onclick="showScreen('login')">התחברו כאן</a></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="appScreen" class="app-layout" style="display:none;">

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img id="logoSidebar" src="" alt="WedJoy">
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar-event">
      <div class="sidebar-names" id="sidebarNames">טוען...</div>
      <div class="sidebar-sub" id="sidebarSub"></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">ניהול</div>
      <button class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard',this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        דשבורד
      </button>
      <button class="nav-item" id="nav-contacts" onclick="showPage('contacts',this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ספר טלפונים

window.onload = async () => {
  ['logoLogin','logoRegister','logoSidebar','logoMobile'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.src = 'data:image/png;base64,' + LOGO_B64;
  });
  showScreen('login');
  const saved = localStorage.getItem('wj_user');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      const { data } = await sb.from('users').select('*').eq('email', parsed.email).single();
      if (data) {
        currentUser = data;
        localStorage.setItem('wj_user', JSON.stringify(data));
        await loadAll();
        showScreen('app');
        renderPage('dashboard');
      } else { localStorage.removeItem('wj_user'); }
    } catch(e) { localStorage.removeItem('wj_user'); }
  }
};

// ── AUTH ─────────────────────────────────────────────────
function showScreen(name) {
  ['loginScreen','registerScreen','appScreen'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById(name+'Screen').style.display = 'flex';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email||!pass) { toast('נא למלא אימייל וסיסמה','error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.textContent='מתחברים...'; btn.disabled=true;
  const { data, error } = await sb.from('users').select('*').eq('email',email).single();
  btn.textContent='התחברות ←'; btn.disabled=false;
  if (error||!data) { toast('אימייל לא נמצא','error'); return; }
  if (data.password_hash !== btoa(pass)) { toast('סיסמה שגויה','error'); return; }
  currentUser = data;
  localStorage.setItem('wj_user', JSON.stringify(data));
  await loadAll();
  showScreen('app');
  renderPage('dashboard');
  toast('ברוכים הבאים בחזרה! 👋','success');
}

async function doRegister() {
  const groom = document.getElementById('regGroom').value.trim();
  const bride = document.getElementById('regBride').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  if (!groom||!bride) { toast('נא למלא שמות החתן והכלה','error'); return; }
  if (!email||!email.includes('@')) { toast('נא למלא אימייל תקין','error'); return; }
  if (pass.length<6) { toast('סיסמה חייבת להיות לפחות 6 תווים','error'); return; }
  if (pass!==pass2) { toast('הסיסמות אינן תואמות','error'); return; }
  const btn = document.getElementById('regBtn');
  btn.textContent='יוצרים חשבון...'; btn.disabled=true;
  const { data:exists } = await sb.from('users').select('id').eq('email',email).single();
  if (exists) { toast('אימייל כבר רשום','error'); btn.textContent='יצירת חשבון ←'; btn.disabled=false; return; }
  const { data, error } = await sb.from('users').insert({
    email, password_hash:btoa(pass), groom_name:groom, bride_name:bride, phone:phone||null
  }).select().single();
  btn.textContent='יצירת חשבון ←'; btn.disabled=false;
  if (error) { toast('שגיאה: '+error.message,'error'); return; }
  currentUser = data;
  localStorage.setItem('wj_user', JSON.stringify(data));
  await loadAll();
  showScreen('app');
  renderPage('dashboard');
  toast(`ברוכים הבאים ${groom} ו${bride}! 🎉`,'success');
}

function doLogout() {
  localStorage.removeItem('wj_user');
  currentUser=null; currentEvent=null; allContacts=[]; allGuests=[];
  showScreen('login');
}

// ── LOAD DATA ─────────────────────────────────────────────
async function loadAll() {
  if (!currentUser) return;
  // Load event
  const { data:ev } = await sb.from('events').select('*').eq('user_id',currentUser.id).single();
  currentEvent = ev || null;
  // Load contacts
  if (currentEvent) {
    const { data:ct } = await sb.from('contacts').select('*').eq('event_id',currentEvent.id).order('created_at',{ascending:false});
    allContacts = ct || [];
    // Load confirmed guests
    const { data:gs } = await sb.from('guests').select('*').eq('event_id',currentEvent.id).order('created_at',{ascending:false});
    allGuests = gs || [];
  }
  updateSidebar();
  updatePendingBadge();
}

function updateSidebar() {
  const g = currentUser?.groom_name||'';
  const b = currentUser?.bride_name||'';
  document.getElementById('sidebarNames').innerHTML = `<em>${b}</em> ו${g}`;
  document.getElementById('sidebarSub').textContent =
    currentEvent?.event_date ? formatDate(currentEvent.event_date) : 'הגדירו תאריך האירוע';
}

function updatePendingBadge() {
  const pending = allContacts.filter(c=>c.invite_sent && !allGuests.find(g=>g.contact_id===c.id));
  const badge = document.getElementById('pendingBadge');
  if (pending.length > 0) { badge.textContent = pending.length; badge.style.display='inline'; }
  else badge.style.display='none';
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
}

// ── PAGE ROUTER ───────────────────────────────────────────
function showPage(name, btn) {
  currentPage = name;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+name);
  if (navEl) navEl.classList.add('active');
  else if (btn) btn.classList.add('active');
  closeSidebar();
  renderPage(name);
}

function renderPage(name) {
  currentPage = name;
  const pages = {
    dashboard: renderDashboard,
    contacts:  renderContacts,
    guests:    renderGuests,
    pending:   renderPending,
    tables:    renderTables,
    seating:   renderSeating,
    reports:   renderReports,
    settings:  renderSettings,
  };
  const fn = pages[name] || renderDashboard;
  fn();
}

  return `<div class="contact-card ${c.invite_sent?'sent':''}">
    <div class="avatar">${(c.first_name[0]||'')+(c.last_name[0]||'')}</div>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:600;font-size:14px;margin-bottom:3px;">${c.first_name} ${c.last_name}
        ${tags.includes('VIP')?'<span class="badge badge-gold" style="margin-right:6px;">VIP</span>':''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:12px;color:var(--gray);direction:ltr;">${c.phone||''}</span>
        <span class="badge badge-gray">${c.category||'חברים'}</span>
        ${c.side?`<span class="badge badge-blue">צד ${c.side}</span>`:''}
        ${c.guests_count>1?`<span class="badge badge-gray">+${c.guests_count-1} מלווים</span>`:''}
        ${c.invite_sent
          ? (hasGuest
            ? (hasGuest.status==='confirmed'
              ? '<span class="badge badge-green">✓ אישר הגעה</span>'
              : '<span class="badge badge-red">✗ לא מגיע</span>')
            : '<span class="badge badge-amber">ממתין לתגובה</span>')
          : '<span class="badge badge-gray">טרם נשלח</span>'}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      ${!c.invite_sent ? `
        <button onclick="sendSingleInvite('${c.id}')" class="wa-btn" style="padding:7px 12px;font-size:12px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

// ── SEATING MAP ───────────────────────────────────────────
let mapEls = [];
let mapDrag = null, mapSel = null;
let dOffX = 0, dOffY = 0;
let mapInited = false;

function renderSeating() {
  const spt       = currentEvent?.seats_per_table || 10;
  const confirmed = allGuests.filter(g=>g.status==='confirmed');

  if (!mapInited) {
    mapInited = true;
    const tableNums = [...new Set(confirmed.filter(g=>g.table_number).map(g=>g.table_number))].sort((a,b)=>a-b);
    const cols = Math.ceil(Math.sqrt(tableNums.length+1)) || 3;
    tableNums.forEach((num,i) => {
      mapEls.push({ id:'t'+num, type:'table', num,
        x: 50 + (i%cols)*130, y: 50 + Math.floor(i/cols)*130,
        w:88, h:88, seats:spt });
    });
  }
  // Refresh guest counts
  mapEls.filter(e=>e.type==='table').forEach(e=>{
    e.guests = confirmed.filter(g=>g.table_number===e.num);
    e.seats  = spt;
  });

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">מפת אולם</div>
        <div class="page-sub">גררו שולחנות ואלמנטים לסדר האולם שלכם</div>
      </div>
      <div class="page-actions" style="flex-wrap:wrap;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="addMT()">+ שולחן</button>
        <button class="btn btn-ghost btn-sm" onclick="addME('stage','🎤','במה',140,60)">+ במה</button>
        <button class="btn btn-ghost btn-sm" onclick="addME('dance','💃','רחבת ריקודים',180,90)">+ רחבה</button>
        <button class="btn btn-ghost btn-sm" onclick="addME('entrance','🚪','כניסה',90,60)">+ כניסה</button>
        <button class="btn btn-ghost btn-sm" onclick="addME('bar','🍸','בר',80,60)">+ בר</button>
        <button class="btn btn-ghost btn-sm" onclick="addME('aisle','','מעבר',160,28)" style="color:var(--gray);">+ מעבר</button>
        <button class="btn btn-sm" id="btnDel" onclick="delSel()"
          style="display:none;background:transparent;color:var(--red);border:1.5px solid #F5C2C8;border-radius:10px;">🗑 מחק</button>
      </div>
    </div>
    <div class="page-body" style="padding-top:10px;">
      <div style="display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
        ${[['#1F7A5A','מלא'],['#D4A017','כמעט מלא'],['#B8B2AC','אורחים'],['#E7D7C1','ריק']].map(([c,l])=>
          `<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray);">
            <div style="width:10px;height:10px;border-radius:50%;background:${c};"></div>${l}</div>`
        ).join('')}
        <div style="margin-right:auto;font-size:11px;color:var(--gray-light);">לחצו לבחירה • גררו להזזה</div>
      </div>

      <div id="mapC" style="position:relative;width:100%;height:580px;
        background:#FAF7F2;border-radius:20px;border:1px solid var(--border);
        overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;">
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
          <defs><pattern id="gdot" width="28" height="28" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="#E7D7C1" opacity="0.6"/>
          </pattern></defs>
          <rect width="100%" height="100%" fill="url(#gdot)"/>
        </svg>
        <div id="mapEls"></div>
      </div>

      <div id="selInfo" style="display:none;margin-top:12px;" class="card card-sm"></div>
    </div>`;

  attachMapEvents();
  drawMapEls();
}

function attachMapEvents() {
  const c = document.getElementById('mapC');
  if (!c) return;
  c.addEventListener('mousedown',  e => { if(e.target===c||e.target.tagName==='svg'||e.target.tagName==='rect') deselect(); });
  c.addEventListener('mousemove',  mapMM);
  c.addEventListener('mouseup',    ()=>{ mapDrag=null; });
  c.addEventListener('touchmove',  mapTM, {passive:false});
  c.addEventListener('touchend',   ()=>{ mapDrag=null; });
}

function drawMapEls() {
  const container = document.getElementById('mapEls');
  if (!container) return;
  container.innerHTML = '';
  mapEls.forEach(el => {
    const div = document.createElement('div');
    div.id = 'me-'+el.id;
    div.style.cssText = `position:absolute;left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;cursor:grab;z-index:${mapSel===el.id?10:1};`;
    const isSel = mapSel===el.id;

    if (el.type==='table') {
      const pct   = el.guests ? el.guests.length/el.seats : 0;
      const bg    = pct>=1?'#1F7A5A':pct>=0.8?'#D4A017':pct>0?'#B8B2AC':'#E7D7C1';
      const tc    = pct>0?'white':'#7A746E';
      div.innerHTML = `<div style="width:100%;height:100%;border-radius:50%;background:${bg};
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        box-shadow:${isSel?'0 0 0 3px #C8A97E,0 4px 20px rgba(0,0,0,0.2)':'0 2px 10px rgba(0,0,0,0.12)'};
        border:${isSel?'2.5px solid #C8A97E':'2px solid rgba(255,255,255,0.5)'};transition:all 0.15s;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:${el.w>80?22:16}px;font-weight:300;color:${tc};line-height:1;">${el.num}</div>
        <div style="font-size:10px;color:${pct>0?'rgba(255,255,255,0.85)':'#B8B2AC'};margin-top:1px;">${el.guests?el.guests.length:0}/${el.seats}</div>
      </div>`;
    } else {
      const cfgs = {
        stage:    {bg:'#2E2924',icon:'🎤',tc:'white',r:'14px'},
        dance:    {bg:'#F5EDE0',icon:'💃',tc:'#8B6530',r:'16px'},
        entrance: {bg:'#E3F2FD',icon:'🚪',tc:'#1565C0',r:'12px'},
        bar:      {bg:'#E8F4EF',icon:'🍸',tc:'#1F7A5A',r:'12px'},
        aisle:    {bg:'rgba(200,169,126,0.15)',icon:'',tc:'#B8905C',r:'8px'},
        custom:   {bg:'#FAF7F2',icon:'📍',tc:'#7A746E',r:'12px'},
      };
      const cfg = cfgs[el.type]||cfgs.custom;
      div.innerHTML = `<div style="width:100%;height:100%;border-radius:${cfg.r};background:${cfg.bg};
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        border:${isSel?'2.5px solid #C8A97E':'1.5px solid #E7D7C1'};
        box-shadow:${isSel?'0 0 0 3px rgba(200,169,126,0.3)':'0 2px 8px rgba(0,0,0,0.07)'};transition:all 0.15s;">
        ${cfg.icon?`<div style="font-size:${el.w>120?24:18}px;">${cfg.icon}</div>`:''}
        <div style="font-size:${el.type==='aisle'?'11px':'11px'};color:${cfg.tc};font-weight:600;text-align:center;padding:0 4px;margin-top:${cfg.icon?'3px':'0'};">${el.label||el.type}</div>
      </div>`;
    }

    div.addEventListener('mousedown', e => startD(e, el.id));
    div.addEventListener('touchstart', e => startDT(e, el.id), {passive:false});
    div.addEventListener('click', e => { e.stopPropagation(); selectEl(el.id); });
    container.appendChild(div);
  });
}

function selectEl(id) {
  mapSel = id;
  const btnDel = document.getElementById('btnDel');
  if (btnDel) btnDel.style.display='inline-flex';
  const el = mapEls.find(e=>e.id===id);
  const info = document.getElementById('selInfo');
  if (el && info) {
    info.style.display='block';
    if (el.type==='table') {
      const names = (el.guests||[]).map(g=>`${g.first_name} ${g.last_name}${g.companions>0?' (+'+g.companions+')':''}`).join(', ')||'ריק';
      info.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <strong>שולחן ${el.num}</strong>
        <span class="badge badge-${(el.guests||[]).length>=el.seats?'red':(el.guests||[]).length>0?'green':'gray'}">${(el.guests||[]).length}/${el.seats}</span>
      </div>
      <div style="font-size:12px;color:var(--gray);">${names}</div>`;
    } else {
      info.innerHTML = `<strong>${el.label||el.type}</strong>`;
    }
  }
  drawMapEls();
}

function deselect() {
  mapSel = null;
  const btnDel = document.getElementById('btnDel');
  if (btnDel) btnDel.style.display='none';
  const info = document.getElementById('selInfo');
  if (info) info.style.display='none';
  drawMapEls();
}

function delSel() {
  if (!mapSel) return;
  if (!confirm('למחוק?')) return;
  mapEls = mapEls.filter(e=>e.id!==mapSel);
  mapSel = null;
  const btnDel = document.getElementById('btnDel');
  if (btnDel) btnDel.style.display='none';
  const info = document.getElementById('selInfo');
  if (info) info.style.display='none';
  drawMapEls();
  toast('נמחק');
}

function addMT() {
  const existing = mapEls.filter(e=>e.type==='table').map(e=>e.num);
  const next = existing.length>0?Math.max(...existing)+1:1;
  const spt  = currentEvent?.seats_per_table||10;
  mapEls.push({ id:'t'+next+'_'+Date.now(), type:'table', num:next,
    x:50+(mapEls.length%4)*110, y:50+Math.floor(mapEls.length/4)*110,
    w:88, h:88, guests:[], seats:spt });
  drawMapEls();
  toast('שולחן '+next+' נוסף ✓','success');
}

function addME(type, icon, label, w, h) {
  mapEls.push({ id:type+'_'+Date.now(), type, icon, label,
    x:80+Math.random()*80, y:200+Math.random()*80, w, h });
  drawMapEls();
  toast(label+' נוסף ✓','success');
}

function startD(e, id) {
  e.stopPropagation(); e.preventDefault();
  selectEl(id);
  mapDrag = id;
  const el = mapEls.find(x=>x.id===id);
  const r  = document.getElementById('mapC').getBoundingClientRect();
  dOffX = e.clientX - r.left - el.x;
  dOffY = e.clientY - r.top  - el.y;
}

function startDT(e, id) {
  e.stopPropagation(); e.preventDefault();
  selectEl(id);
  mapDrag = id;
  const el = mapEls.find(x=>x.id===id);
  const r  = document.getElementById('mapC').getBoundingClientRect();
  const t  = e.touches[0];
  dOffX = t.clientX - r.left - el.x;
  dOffY = t.clientY - r.top  - el.y;
}

function mapMM(e) {
  if (!mapDrag) return;
  const r  = document.getElementById('mapC').getBoundingClientRect();
  const el = mapEls.find(x=>x.id===mapDrag);
  if (!el) return;
  el.x = Math.max(0, Math.min(r.width -el.w, e.clientX-r.left-dOffX));
  el.y = Math.max(0, Math.min(r.height-el.h, e.clientY-r.top -dOffY));
  const div = document.getElementById('me-'+el.id);
  if (div) { div.style.left=el.x+'px'; div.style.top=el.y+'px'; }
}

function mapTM(e) {
  if (!mapDrag) return;
  e.preventDefault();
  const t  = e.touches[0];
  const r  = document.getElementById('mapC').getBoundingClientRect();
  const el = mapEls.find(x=>x.id===mapDrag);
  if (!el) return;
  el.x = Math.max(0, Math.min(r.width -el.w, t.clientX-r.left-dOffX));
  el.y = Math.max(0, Math.min(r.height-el.h, t.clientY-r.top -dOffY));
  const div = document.getElementById('me-'+el.id);
  if (div) { div.style.left=el.x+'px'; div.style.top=el.y+'px'; }
}

function renderSettings() {
  openSettingsModal();
}

// ── CONTACTS CRUD ─────────────────────────────────────────
async function addContact() {
  const first = document.getElementById('cFirst').value.trim();
  const last  = document.getElementById('cLast').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  if (!first||!last||!phone) { toast('נא למלא שם וטלפון','error'); return; }

  if (!currentEvent) {
    const { data:ev } = await sb.from('events').insert({user_id:currentUser.id}).select().single();
    currentEvent = ev;
  }

  const tags = [];
  if (document.getElementById('cVip').checked)     tags.push('VIP');
  if (document.getElementById('cFriends').checked) tags.push('שולחן חברים');
  if (document.getElementById('cManual').checked)  tags.push('הושבה ידנית');

  const { data, error } = await sb.from('contacts').insert({
    event_id:    currentEvent.id,
    first_name:  first,
    last_name:   last,
    phone,
    guests_count: parseInt(document.getElementById('cComp').value)||1,
    side:        document.getElementById('cSide').value,
    category:    document.getElementById('cCat').value,
    notes:       document.getElementById('cNotes').value||null,
    tags,
  }).select().single();

  if (error) { toast('שגיאה: '+error.message,'error'); return; }

  allContacts.unshift(data);
  closeModal('modalContact');
  ['cFirst','cLast','cPhone','cNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cComp').value='1';
  ['cVip','cFriends','cManual'].forEach(id=>document.getElementById(id).checked=false);
  toast(`${first} ${last} נוסף/ה ✓`,'success');
  updatePendingBadge();
  if (currentPage==='contacts') renderContacts();
  else if (currentPage==='dashboard') renderDashboard();
}

async function deleteContact(id) {
  if (!confirm('למחוק איש קשר זה?')) return;
  await sb.from('contacts').delete().eq('id',id);
  allContacts = allContacts.filter(c=>c.id!==id);
  toast('הוסר ✓');
  updatePendingBadge();
  renderContacts();
}

// ── WHATSAPP ──────────────────────────────────────────────
const WHAPI_TOKEN = () => currentEvent?.whapi_token || '';

function buildMsg(contactName, token) {
  const g = currentUser?.groom_name||'';
  const b = currentUser?.bride_name||'';
  return `שלום ${contactName} 👋\n\nנשמח לראותך בחתונה של\n${b} ו${g} ❤️\n\nלאישור הגעה לחצו כאן:\n${BOOK_URL}?token=${token}`;
}

async function sendViaWhapi(phone, message) {
  const token = WHAPI_TOKEN();
  if (!token) { toast('נא להגדיר WhatsApp API Token בהגדרות','error'); return false; }
  const clean = phone.replace(/\D/g,'').replace(/^0/,'972');
  try {
    const res = await fetch(`${WAPI_BASE}/messages/text`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
      body: JSON.stringify({ to:`${clean}@s.whatsapp.net`, body:message })
    });
    const data = await res.json();
    return !data.error;
  } catch(e) { return false; }
}

async function sendSingleInvite(contactId) {
  const c = allContacts.find(x=>x.id===contactId);
  if (!c) return;
  const msg = buildMsg(c.first_name, c.rsvp_token);

  // Try whapi, fallback to wa.me
  const ok = await sendViaWhapi(c.phone, msg);
  if (!ok) {
    // Fallback: open wa.me
    openDirectWA(c.phone, msg);
  }

  // Mark as sent
  await sb.from('contacts').update({invite_sent:true,invite_sent_at:new Date().toISOString()}).eq('id',contactId);
  c.invite_sent = true;
  toast(`הזמנה נשלחה ל${c.first_name} ✓`,'success');
  updatePendingBadge();
  if (currentPage==='contacts') renderContacts();
  else renderDashboard();
}

function openWAModal() {
  const unsent = allContacts.filter(c=>!c.invite_sent);
  const g = currentUser?.groom_name||'';
  const b = currentUser?.bride_name||'';
  document.getElementById('waMsgPreview').innerHTML =
    `שלום <strong>{שם}</strong> 👋<br><br>נשמח לראותך בחתונה של<br><em>${b} ו${g}</em> ❤️<br><br>לאישור הגעה לחצו כאן:<br><span style="color:var(--green);">${BOOK_URL}?token={token}</span>`;
  document.getElementById('waCount').textContent = `${unsent.length} אנשי קשר יקבלו הזמנה`;
  openModal('modalWA');
}

async function sendInvites() {
  const unsent = allContacts.filter(c=>!c.invite_sent);
  if (unsent.length===0) { toast('כולם כבר קיבלו הזמנה','error'); return; }
  closeModal('modalWA');
  toast(`שולחים ${unsent.length} הזמנות...`);
  let sent=0;
  for (const c of unsent) {
    await sendSingleInvite(c.id);
    sent++;
    await new Promise(r=>setTimeout(r,500)); // Rate limit
  }
  toast(`${sent} הזמנות נשלחו בהצלחה ✓`,'success');
}

async function sendReminder(contactId, phone, name) {
  const g = currentUser?.groom_name||'';
  const b = currentUser?.bride_name||'';
  const c = allContacts.find(x=>x.id===contactId);
  const msg = `שלום ${name} 👋\n\nרצינו לוודא שקיבלת את ההזמנה לחתונה של\n${b} ו${g} ❤️\n\nנשמח לדעת אם תוכל/י להגיע:\n${BOOK_URL}?token=${c?.rsvp_token||''}`;
  const ok = await sendViaWhapi(phone, msg);
  if (!ok) openDirectWA(phone, msg);
  toast(`תזכורת נשלחה ל${name} ✓`,'success');
}

async function sendReminderAll() {
  const pending = allContacts.filter(c=>c.invite_sent && !allGuests.find(g=>g.contact_id===c.id));
  for (const c of pending) await sendReminder(c.id, c.phone, c.first_name);
  toast(`תזכורות נשלחו ל-${pending.length} מוזמנים ✓`,'success');
}

function openDirectWA(phone, msg='') {
  const clean = phone.replace(/\D/g,'').replace(/^0/,'972');
  const url = msg ? `https://wa.me/${clean}?text=${encodeURIComponent(msg)}` : `https://wa.me/${clean}`;
  window.open(url,'_blank');
}

// ── SMART SEATING ─────────────────────────────────────────
async function runSmartSeating() {
  const confirmed = allGuests.filter(g=>g.status==='confirmed'&&!g.table_number);
  if (confirmed.length===0) { toast('כל המאושרים כבר משובצים ✓','success'); return; }
  const seatsPerTable = currentEvent?.seats_per_table || 10;
  const tablesCount   = currentEvent?.tables_count    || 20;

  // Build table occupancy
  const tables = {};
  for(let i=1;i<=tablesCount;i++) tables[i]=0;
  allGuests.filter(g=>g.table_number).forEach(g=>{ if(tables[g.table_number]!==undefined) tables[g.table_number]+=(g.companions||1)+1; });

  // Sort: VIP first, then by last_name (family grouping), then companions
  const vip  = confirmed.filter(g=>(g.tags||[]).includes('VIP'));
  const manual = confirmed.filter(g=>(g.tags||[]).includes('הושבה ידנית'));
  const friends= confirmed.filter(g=>(g.tags||[]).includes('שולחן חברים')&&!(g.tags||[]).includes('VIP'));
  const rest  = confirmed.filter(g=>!vip.includes(g)&&!friends.includes(g)&&!manual.includes(g));

  let assigned=0, skipped=0;
  const toAssign = [...vip, ...friends, ...rest];

  for (const guest of toAssign) {
    const size = (guest.companions||0)+1;
    // Find table with enough space
    let bestTable = null;
    for (let t=1;t<=tablesCount;t++) {
      if (seatsPerTable - (tables[t]||0) >= size) { bestTable=t; break; }
    }
    if (bestTable) {
      await sb.from('guests').update({table_number:bestTable}).eq('id',guest.id);
      guest.table_number = bestTable;
      tables[bestTable] = (tables[bestTable]||0) + size;
      assigned++;
    } else skipped++;
  }

  toast(`שובצו ${assigned} מוזמנים${skipped>0?` · ${skipped} דורשים שיבוץ ידני`:''}${assigned>0?' ✓':''}`, assigned>0?'success':'');
  renderPage(currentPage);
}

async function assignTable(guestId, num) {
  const n = parseInt(num);
  if (!n||n<1) return;
  await sb.from('guests').update({table_number:n}).eq('id',guestId);
  const g = allGuests.find(x=>x.id===guestId);
  if (g) g.table_number = n;
  toast(`שולחן ${n} ✓`,'success');
}

async function removeFromTable(guestId) {
  await sb.from('guests').update({table_number:null}).eq('id',guestId);
  const g = allGuests.find(x=>x.id===guestId);
  if (g) g.table_number = null;
  toast('הוסר מהשולחן');
  renderTables();
}

// ── SETTINGS ──────────────────────────────────────────────
function openSettingsModal() {
  const ev = currentEvent||{};
  document.getElementById('evDate').value        = ev.event_date||'';
  document.getElementById('evTime').value        = ev.event_time||'';
  document.getElementById('evVenue').value       = ev.venue||'';
  document.getElementById('evAddress').value     = ev.address||'';
  document.getElementById('evTables').value      = ev.tables_count||'';
  document.getElementById('evSeats').value       = ev.seats_per_table||10;
  document.getElementById('evWaze').value        = ev.waze_link||'';
  document.getElementById('evWapiToken').value   = ev.whapi_token||'';
  openModal('modalSettings');
}

async function saveEvent() {
  const payload = {
    user_id:        currentUser.id,
    event_date:     document.getElementById('evDate').value    ||null,
    event_time:     document.getElementById('evTime').value    ||null,
    venue:          document.getElementById('evVenue').value   ||null,
    address:        document.getElementById('evAddress').value ||null,
    tables_count:   parseInt(document.getElementById('evTables').value)||null,
    seats_per_table:parseInt(document.getElementById('evSeats').value)||10,
    waze_link:      document.getElementById('evWaze').value    ||null,
    whapi_token:    document.getElementById('evWapiToken').value||null,
  };
  let error;
  if (currentEvent) {
    const res = await sb.from('events').update(payload).eq('id',currentEvent.id).select().single();
    error=res.error; if(res.data) currentEvent=res.data;
  } else {
    const res = await sb.from('events').insert(payload).select().single();
    error=res.error; if(res.data) currentEvent=res.data;
  }
  if (error) { toast('שגיאה: '+error.message,'error'); return; }
  closeModal('modalSettings');
  toast('הגדרות נשמרו ✓','success');
  updateSidebar();
  renderDashboard();
}

// ── EXPORT ────────────────────────────────────────────────
function exportReport(type) {
  let rows=[], headers=[];
  if (type==='contacts') {
    headers=['שם פרטי','שם משפחה','טלפון','קטגוריה','צד','כמות','נשלח'];
    rows = allContacts.map(c=>[c.first_name,c.last_name,c.phone,c.category,c.side,c.guests_count,c.invite_sent?'כן':'לא']);
  } else if (type==='confirmed') {
    headers=['שם פרטי','שם משפחה','טלפון','מלווים','שולחן'];
    rows = allGuests.filter(g=>g.status==='confirmed').map(g=>[g.first_name,g.last_name,g.phone,g.companions,g.table_number||'']);
  } else if (type==='declined') {
    headers=['שם פרטי','שם משפחה','טלפון'];
    rows = allGuests.filter(g=>g.status==='declined').map(g=>[g.first_name,g.last_name,g.phone]);
  } else if (type==='tables') {
    headers=['שם פרטי','שם משפחה','שולחן','מלווים'];
    rows = allGuests.filter(g=>g.table_number).sort((a,b)=>a.table_number-b.table_number)
      .map(g=>[g.first_name,g.last_name,g.table_number,g.companions]);
  }
  const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wedjoy_${type}_${new Date().toLocaleDateString('he-IL')}.csv`;
  a.click();
  toast('הדוח יוצא ✓','success');
}

// ── UTILS ─────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

function toast(msg, type='') {
  const c=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
