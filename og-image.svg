<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1115"/>
      <stop offset="50%" style="stop-color:#171A21"/>
      <stop offset="100%" style="stop-color:#1E2028"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E7D7C1"/>
      <stop offset="50%" style="stop-color:#C8A97E"/>
      <stop offset="100%" style="stop-color:#9A7A52"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle pattern -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(200,169,126,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Gold border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" 
    stroke="rgba(200,169,126,0.2)" stroke-width="1" rx="20"/>
  
  <!-- Rings icon -->
  <circle cx="540" cy="240" r="70" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <circle cx="600" cy="240" r="70" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.8"/>
  
  <!-- Diamond -->
  <polygon points="570,168 582,184 570,200 558,184" fill="url(#gold)" opacity="0.9"/>
  
  <!-- Main text -->
  <text x="600" y="360" font-family="Georgia,serif" font-size="64" font-weight="400"
    fill="white" text-anchor="middle" font-style="italic">הוזמנת לחתונה</text>
  
  <!-- Sub text -->
  <text x="600" y="420" font-family="Arial,sans-serif" font-size="28"
    fill="rgba(200,169,126,0.8)" text-anchor="middle">לחצו לאישור הגעה</text>
  
  <!-- Loviva brand -->
  <text x="600" y="530" font-family="Georgia,serif" font-size="32" font-style="italic"
    fill="url(#gold)" text-anchor="middle">Loviva</text>
  <text x="600" y="558" font-family="Arial,sans-serif" font-size="14"
    fill="rgba(200,169,126,0.5)" text-anchor="middle" letter-spacing="4">LESS STRESS. MORE LOVE.</text>
  
  <!-- Decorative lines -->
  <line x1="200" y1="480" x2="480" y2="480" stroke="rgba(200,169,126,0.2)" stroke-width="1"/>
  <line x1="720" y1="480" x2="1000" y2="480" stroke="rgba(200,169,126,0.2)" stroke-width="1"/>
  <text x="600" y="484" font-family="Georgia,serif" font-size="16"
    fill="rgba(200,169,126,0.4)" text-anchor="middle">✦</text>
</svg>